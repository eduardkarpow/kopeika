#:schema https://json.schemastore.org/any.json

env_files = []
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/control-plane/main.go"
  delay = 1000
  entrypoint = ["./tmp/main"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  ignore_dangerous_root_dir = false
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  
  # CHANGE 1: Give the old process 500ms to free up port 8000
  kill_delay = "500ms" 
  
  log = "build-errors.log"
  
  # CHANGE 2: Force Air to poll for changes inside Docker mount volumes
  poll = true
  poll_interval = 500 # ms
  
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  
  # CHANGE 3: Send a friendly interrupt signal first so Go can release the port cleanly
  send_interrupt = true 
  
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  mode = ""
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  # CHANGE 4: Clean up the binary remnants when Air stops
  clean_on_exit = true

[proxy]
  app_port = 0
  app_start_timeout = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true